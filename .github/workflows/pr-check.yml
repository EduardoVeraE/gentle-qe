name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

jobs:
  check-pr-size:
    name: Check PR Cognitive Load
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR stays within review budget
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            const limit = 400;
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const total = additions + deletions;
            const labels = (pr.labels || []).map(label => label.name);
            const hasException = labels.includes('size:exception');

            console.log(`PR size: +${additions} / -${deletions} = ${total} changed lines`);
            console.log(`Labels: ${labels.join(', ') || '(none)'}`);

            if (total <= limit) {
              console.log(`✅ PR is within the ${limit}-line cognitive review budget.`);
              return;
            }

            const message =
              `PR changes ${total} lines (+${additions}/-${deletions}), exceeding the ${limit}-line cognitive review budget.\n\n` +
              'Why this exists: reviews should stay small enough to complete in ~60 minutes without reviewer fatigue.\n' +
              'Please split this work into chained or stacked PRs, or ask a maintainer for the size:exception label when the large diff is unavoidable.';

            if (hasException) {
              core.warning(`⚠️ ${message}`);
              console.log('✅ size:exception label present; allowing oversized PR with warning.');
              return;
            }

            core.setFailed(`❌ ${message}`);

  check-type-label:
    name: Check PR Has type:* Label
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR has exactly one type:* label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const labels = pr.labels.map(l => l.name);
            const typeLabels = labels.filter(l => l.startsWith('type:'));

            console.log(`All PR labels: ${labels.join(', ') || '(none)'}`);
            console.log(`type:* labels found: ${typeLabels.join(', ') || '(none)'}`);

            if (typeLabels.length === 0) {
              core.setFailed(
                '❌ PR must have exactly one type:* label.\n\n' +
                'Valid labels:\n' +
                '  type:fix, type:feat, type:docs,\n' +
                '  type:chore, type:refactor, type:breaking-change\n\n' +
                'Add the appropriate label to the PR.'
              );
            } else if (typeLabels.length > 1) {
              core.setFailed(
                `❌ PR has ${typeLabels.length} type:* labels: ${typeLabels.join(', ')}\n` +
                'A PR must have exactly ONE type:* label. Please remove the extra one(s).'
              );
            } else {
              console.log(`✅ PR has type label: ${typeLabels[0]}`);
            }
