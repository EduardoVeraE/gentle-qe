version: 2

project_name: gentle-qe

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/gentle-ai
    binary: gentle-qe
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew cask (no formula): el binario no está firmado, así que se distribuye
# como cask y se le quita el atributo de cuarentena en el postflight.
homebrew_casks:
  - repository:
      owner: EduardoVeraE
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: gentle-qe
    homepage: "https://github.com/EduardoVeraE/gentle-qe"
    description: "Gentle-QE — Unified AI Ecosystem for Testing and Reliability."
    commit_msg_template: "chore: update gentle-qe cask to {{ .Tag }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gentle-qe"]
          end

scoops:
  - repository:
      owner: EduardoVeraE
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: gentle-qe
    homepage: "https://github.com/EduardoVeraE/gentle-qe"
    description: "Gentle-QE — Unified AI Ecosystem for Testing and Reliability."
    license: MIT
    commit_msg_template: "chore: update gentle-qe to {{ .Tag }}"
