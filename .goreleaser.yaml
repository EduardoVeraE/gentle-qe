version: 2

project_name: gentle-qe

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/gentle-ai
    binary: gentle-qe
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew formula (no cask): los casks no existen en Homebrew para Linux y,
# ante nombre ambiguo, brew resuelve la fórmula; además el flujo de self-update
# (`brew trust --formula`) asume fórmula. El tarball descargado por brew via
# curl no recibe el atributo de cuarentena, así que el postflight de xattr que
# necesitaba el cask sobra. goreleaser marca `brews` como deprecated a favor de
# casks; se usa a propósito — decisión de distribución de este fork.
brews:
  - repository:
      owner: EduardoVeraE
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: gentle-qe
    directory: Formula
    homepage: "https://github.com/EduardoVeraE/gentle-qe"
    description: "Gentle-QE — Unified AI Ecosystem for Testing and Reliability."
    license: MIT
    commit_msg_template: "chore: update gentle-qe formula to {{ .Tag }}"
    install: |
      bin.install "gentle-qe"

scoops:
  - repository:
      owner: EduardoVeraE
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: gentle-qe
    homepage: "https://github.com/EduardoVeraE/gentle-qe"
    description: "Gentle-QE — Unified AI Ecosystem for Testing and Reliability."
    license: MIT
    commit_msg_template: "chore: update gentle-qe to {{ .Tag }}"

# Reemplaza el release y sus assets si el tag se re-publica (p. ej. tras un
# force-push del tag). Sin esto, GitHub rechaza el re-subido de assets con
# 422 "already_exists" y goreleaser falla.
release:
  mode: replace
